        <script>

            // VARIABLES

            const META = {de: "BAUVOLK – HEFTE", en: "BAUVOLK – ISSUES"}
            
            const OVERRIDE_TITLE_TEXT = "<span class='title-large'><span lang='de'>ÜBERSICHT</span><span lang='en'>OVERVIEW</span></span><span class='title-small'>#</span>"

            // TEMPLATES
        

            function issue_cover_template(i){
                let issue = ISSUE_LIST[i]; 
                return `<a class="cover" href=` + issue.url + `>
                            <img class="cover-image" lang="de" src="` + issue.cover_de + `" alt="Cover von ` + issue.title_de + `">
                            <img class="cover-image" lang="en" src="` + issue.cover_en + `" alt="Cover of ` + issue.title_en + `" >
                        </a>`
            }

            function index_title_template(i){
                let issue = ISSUE_LIST[i]

                return `<a class="issue-title center" href=` + issue.url + `>
                            <span lang="de">` + issue.title_de + `</span>
                            <span lang="en">` + issue.title_en + `</span>
                        </a>`
            }

            function index_template(i){
                let issue = ISSUE_LIST[i]

                return `<span onclick="select_issue(` + i + `)" id="index` + i + `" class="indexitem issue-title">
                            <div class="issue-info">
                                <span class="issue-number">` + issue.no + `</span>
                                <span class="issue-title" lang="de">` + issue.title_de + `</span>
                                <span class="issue-title" lang="en">` + issue.title_en + `</span>
                            </div>
                        </span>`
            }

            function issue_list_template(i){
                let issue = ISSUE_LIST[i]; 
                return `<a class="issue-info" id="issue-list-` + i + `" onmouseenter="select_issue(` + i + `)" href=` + issue.url + `>
                            <span class="issue-number">` + issue.no + `</span>
                            <span class="issue-title" lang="de">` + issue.title_de + `</span>
                            <span class="issue-title" lang="en">` + issue.title_en + `</span>
                        </a>`
            }

            
            // LOADING

            load_components(["header", "databanner"])
            
        </script>

        <script>

            // COVERSCRIPT

            document.addEventListener("DOMContentLoaded", init_issues)

            var current_issue = 0
            var INDEX_OPEN = false
            var issues_initialized = false
            var controls_initialized = false

            function pre_init() {
                init_controls()
            }
            
            function init_issues() {
                for (let i = 0; i < ISSUE_LIST.length; i++) {
                    document.getElementById("issue-covers").insertAdjacentHTML('beforeend', issue_cover_template(i));
                    document.getElementById("issue-list").insertAdjacentHTML('beforeend', issue_list_template(i));
                }

                seteagerload()
                issues_initialized = true
                init_controls()
            }

            function init_controls() {
                if (!issues_initialized || controls_initialized) {
                    return
                }

                controls_initialized = true
                for (let i = 0; i < ISSUE_LIST.length; i++) {
                    document.getElementById('slide-index').insertAdjacentHTML('beforeend', index_template(i))
                }

                select_issue(current_issue)
            }

            function select_issue(index) {
                document.querySelectorAll("#issue-covers .cover").forEach((item) => {
                    item.style.display = "none"
                })

                document.querySelectorAll("#issue-covers .cover")[index].style.display = "flex"
                current_issue = index

                document.querySelectorAll("#issue-list .issue-info").forEach((item) => {
                    item.style.border = "4px solid transparent"
                })

                document.getElementById("issue-list-" + index).style.border = "4px outset grey"

                document.getElementById("slide-title").innerHTML = index_title_template(current_issue)
                document.getElementById("slide-current").innerHTML = OVERRIDE_TITLE_TEXT

                reset_language()
                limit_buttons(current_issue, ISSUE_LIST, "letztes", "naechstes")
                hide_slide_index()
            }

            function letztes() {
                if (current_issue > 0) {
                    select_issue(current_issue - 1)
                }
            }

            function naechstes() {
                if (current_issue < ISSUE_LIST.length - 1) {
                    select_issue(current_issue + 1)
                }
            }

            function toggle_slide_index() {
                if (INDEX_OPEN) {
                    hide_slide_index()
                } else {
                    display_slide_index()
                }
            }

            function display_slide_index() {
                document.getElementById("slide-index").style.display = "flex"
                INDEX_OPEN = true
            }

            function hide_slide_index() {
                document.getElementById("slide-index").style.display = "none"
                INDEX_OPEN = false
            }



            // EAGER LOAD ACCORDING TO LANGUAGE

            function seteagerload() {

                let covers = document.getElementById("issue-covers").getElementsByTagName("img")
                let lang = localStorage.getItem("bauvolk_language")
                
                for (let i = 0; i < covers.length; i++) {
                    if(covers[i].lang == lang) {
                        covers[i].loading = "eager"
                    }
                }
            }

        </script>

        #issue-library {
