        <script>

            // =====================================================================
            // PAGE METADATA
            // =====================================================================

            const META = {de: "BAUVOLK – HEFTE", en: "BAUVOLK – ISSUES"}
            
            const OVERRIDE_TITLE_TEXT = "<span class='title-large'><span lang='de'>ÜBERSICHT</span><span lang='en'>OVERVIEW</span></span><span class='title-small'>#</span>"

            // =====================================================================
            // ISSUE MARKUP TEMPLATES
            // =====================================================================
        

            function issue_cover_template(i){
                let issue = ISSUE_LIST[i]; 
                return `<a class="cover" href=` + issue.url + `>
                            <img class="cover-image" lang="de" src="` + issue.cover_de + `" alt="Cover von ` + issue.title_de + `">
                            <img class="cover-image" lang="en" src="` + issue.cover_en + `" alt="Cover of ` + issue.title_en + `" >
                        </a>`
            }

            function issue_title_template(i){
                let issue = ISSUE_LIST[i]

                return `<a class="issue-title center" href=` + issue.url + `>
                            <span lang="de">` + issue.title_de + `</span>
                            <span lang="en">` + issue.title_en + `</span>
                        </a>`
            }

            function overview_item_template(i){
                let issue = ISSUE_LIST[i]

                return `<span onclick="select_issue(` + i + `)" id="index` + i + `" class="indexitem issue-title">
                            <div class="issue-info">
                                <span class="issue-number">` + issue.no + `</span>
                                <span class="issue-title" lang="de">` + issue.title_de + `</span>
                                <span class="issue-title" lang="en">` + issue.title_en + `</span>
                            </div>
                        </span>`
            }

            function issue_list_template(i){
                let issue = ISSUE_LIST[i]; 
                return `<a class="issue-info" id="issue-list-` + i + `" onmouseenter="select_issue(` + i + `)" href=` + issue.url + `>
                            <span class="issue-number">` + issue.no + `</span>
                            <span class="issue-title" lang="de">` + issue.title_de + `</span>
                            <span class="issue-title" lang="en">` + issue.title_en + `</span>
                        </a>`
            }

            
            // =====================================================================
            // SHARED COMPONENTS
            // =====================================================================

            load_components(["header", "databanner"])
            
        </script>

        <script>

            // =====================================================================
            // ISSUE VIEW STATE
            // =====================================================================

            document.addEventListener("DOMContentLoaded", init_issues)

            // ---------------------------------------------------------------------
            // State
            // ---------------------------------------------------------------------

            var current_issue = 0
            var OVERVIEW_OPEN = false
            var issues_initialized = false
            var controls_initialized = false

            // ---------------------------------------------------------------------
            // Initialization
            // ---------------------------------------------------------------------

            function pre_init() {
                init_controls()
            }
            
            function init_issues() {
                for (let i = 0; i < ISSUE_LIST.length; i++) {
                    document.getElementById("covers").insertAdjacentHTML('beforeend', issue_cover_template(i));
                    document.getElementById("issue-list").insertAdjacentHTML('beforeend', issue_list_template(i));
                }

                seteagerload()
                issues_initialized = true
                init_controls()
            }

            function init_controls() {
                if (!issues_initialized || controls_initialized) {
                    return
                }

                controls_initialized = true
                for (let i = 0; i < ISSUE_LIST.length; i++) {
                    document.getElementById('overview').insertAdjacentHTML('beforeend', overview_item_template(i))
                }

                select_issue(current_issue)
            }

            // ---------------------------------------------------------------------
            // Issue selection
            // ---------------------------------------------------------------------

            function select_issue(index) {
                document.querySelectorAll("#covers .cover").forEach((item) => {
                    item.style.display = "none"
                })

                document.querySelectorAll("#covers .cover")[index].style.display = "flex"
                current_issue = index

                document.querySelectorAll("#issue-list .issue-info").forEach((item) => {
                    item.style.border = "4px solid transparent"
                })

                document.getElementById("issue-list-" + index).style.border = "4px outset grey"

                document.getElementById("issue-title").innerHTML = issue_title_template(current_issue)
                document.getElementById("issue-current").innerHTML = OVERRIDE_TITLE_TEXT

                reset_language()
                limit_buttons(current_issue, ISSUE_LIST, "letztes", "naechstes")
                hide_overview()
            }

            // ---------------------------------------------------------------------
            // Issue navigation
            // ---------------------------------------------------------------------

            function letztes() {
                if (current_issue > 0) {
                    select_issue(current_issue - 1)
                }
            }

            function naechstes() {
                if (current_issue < ISSUE_LIST.length - 1) {
                    select_issue(current_issue + 1)
                }
            }

            // ---------------------------------------------------------------------
            // Overview
            // ---------------------------------------------------------------------

            function toggle_overview() {
                if (OVERVIEW_OPEN) {
                    hide_overview()
                } else {
                    display_overview()
                }
            }

            function display_overview() {
                document.getElementById("overview").style.display = "flex"
                OVERVIEW_OPEN = true
            }

            function hide_overview() {
                document.getElementById("overview").style.display = "none"
                OVERVIEW_OPEN = false
            }



            // ---------------------------------------------------------------------
            // Language-specific image loading
            // ---------------------------------------------------------------------

            function seteagerload() {

                let covers = document.getElementById("covers").getElementsByTagName("img")
                let lang = localStorage.getItem("bauvolk_language")
                
                for (let i = 0; i < covers.length; i++) {
                    if(covers[i].lang == lang) {
                        covers[i].loading = "eager"
                    }
                }
            }

        </script>

        <style>

           Configuration
           ======================================================================== */

        /* ========================================================================

        #overview {

            align-items: flex-start;

            font-size: 20pt;
            color: white;
        }

        #overview::-webkit-scrollbar-thumb {
            background: var(--scrollbar-color-overview) !important;
        }

        #overview .issue-info {
            justify-content: flex-start;
            width: fit-content;
        }

        #overview > span:hover {
            color: var(--color-link-hover);
            cursor: pointer;
        }

        /* ========================================================================
           Covers
           ======================================================================== */

        #covers > .cover {
            display: none;
        }

        .cover {
            display: flex;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            justify-content: flex-start;
            height: 550px;
            max-height: 50vh;
            min-height: 400px;
        }

        .cover-image {
            object-fit: cover;
            cursor: pointer;
            filter: drop-shadow(10px 10px 10px rgba(0, 0, 0, 0.35));
            max-height: 100%;
        }

        #covers .cover {
            min-width: 300px;
            max-width: 400px;
            max-height: 100%;
            height: 100%;
            justify-content: center;
        }

        #covers .cover-image {
            object-fit: contain;
        }

        /* ========================================================================
           Desktop issue library
           ======================================================================== */

        #issue-list {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            gap: 5px;
        }

        #issue-list .issue-info {
            padding: 10px 20px;
            min-width: 350px;
            text-align: left;
            border: 3px solid transparent;
            justify-content: flex-start;
        }

        #covers {
            display: flex;
            align-items: center;
        }

        /* ========================================================================
           Responsive adjustments
           ======================================================================== */


        @media screen and (max-width: 520px) {
            #letztes, #naechstes {
                padding: 0;
                width: 45px;
                font-size: 35pt;
            }
        }

        @media screen and (max-width: 800px), (hover: none) {
            #content {
                min-height: 0;
                overflow: hidden;
                position: relative;
                padding-bottom: 0;
                flex-direction: column;
                align-items: center;
            }
            

            #controls {
                display: flex !important;
                flex: 0 0 auto;
                justify-content: space-evenly;
                gap: 20px;
            }

            #issue-list {
                display: none;
            }

            #covers {
                flex: 1 1 auto;
                width: 100%;
                min-height: 0;
                justify-content: center;
                align-items: center;
            }

            #covers .cover {
                min-width: unset;
                min-height: 0;
            }
        }

        /* ========================================================================
           Small screens
           ======================================================================== */
        #issue-title * {
            text-transform: uppercase;
            font-weight: 300 !important;
            font-size: clamp(1rem, -0.54rem + 5.7vw, 1.25rem) !important;
        }

        .title-small {
            display: none;
        }

        @media screen and (max-width: 320px) {
            .title-small {
                display: inline;
            }

            .title-large {
                display: none;
            }

            #issue-current {
                padding: 0 !important;
                width: 45px !important;
                font-size: 20pt !important;
            }
        }
